<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAGOH AI — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#3d2f24;--deep:#2a1f16;--cream:#fdf8f0;--parchmt:#f5ede0;
  --border:#e0d4c4;--border2:#d4c4b0;--muted:#b5a090;--dim:#8a7868;
  --teal:#2a9d8f;--teal-lt:#e0f5f3;--teal-md:#a0dcd6;
  --gold:#e9a028;--gold-lt:#fdf0d5;--gold-md:#f7d08a;
  --rose:#e8524a;--rose-lt:#fce8e7;--rose-md:#f5c4c2;
  --sage:#4a7c59;--sage-lt:#e8f4eb;
  --sans:'DM Sans',sans-serif;--serif:'Fraunces',serif;
}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--deep);border-bottom:3px solid var(--gold);padding:0 2rem;height:60px;display:flex;align-items:center;gap:1rem;justify-content:space-between;}
.wordmark{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:#fff;}
.wordmark em{color:var(--gold);font-style:italic;}
.topbar-right{display:flex;gap:1rem;align-items:center;}
.badge{font-size:0.6rem;background:var(--rose);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.06em;}
.signout-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.65);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.68rem;font-weight:500;transition:all 0.15s;font-family:var(--sans);}
.signout-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.main{flex:1;max-width:1400px;margin:0 auto;width:100%;padding:2rem 1.5rem;}
.header{margin-bottom:2rem;}
.page-title{font-family:var(--serif);font-size:2rem;font-weight:500;color:var(--ink);margin-bottom:0.5rem;}
.page-sub{font-size:0.8rem;color:var(--dim);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1.5rem;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.stat-value{font-family:var(--serif);font-size:2.5rem;font-weight:700;color:var(--teal);line-height:1;}
.stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:0.5rem;}
.lock-screen{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:100;}
.lock-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:360px;text-align:center;}
.lock-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:0.5rem;}
.lock-sub{font-size:0.78rem;color:var(--dim);margin-bottom:1.25rem;}
.finput{width:100%;background:var(--cream);border:1.5px solid var(--border2);color:var(--ink);font-family:var(--sans);font-size:0.85rem;padding:0.65rem 0.85rem;outline:none;margin-bottom:0.75rem;border-radius:10px;transition:border-color 0.2s;}
.finput:focus{border-color:var(--teal);}
.fbtn{font-family:var(--sans);font-size:0.85rem;font-weight:600;padding:0.75rem 1.5rem;background:var(--teal);border:none;color:#fff;cursor:pointer;border-radius:10px;transition:all 0.15s;}
.fbtn:hover:not(:disabled){background:#228b7e;}
.fbtn:disabled{opacity:0.4;cursor:not-allowed;}
.fbtn.gold{background:var(--gold);color:var(--deep);}
.fbtn.gold:hover:not(:disabled){background:#d48f20;}
.fbtn.danger{background:var(--rose);color:#fff;width:auto;}
.fbtn.danger:hover:not(:disabled){background:#c63d36;}
.fbtn.full{width:100%;}
.alert{padding:0.75rem 1rem;border-radius:10px;font-size:0.78rem;margin-top:0.75rem;display:none;}
.alert.ok{background:var(--sage-lt);border:1px solid var(--sage);color:var(--sage);}
.alert.err{background:var(--rose-lt);border:1px solid var(--rose-md);color:var(--rose);}
.alert.show{display:block;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.tab{flex:1;padding:0.75rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);cursor:pointer;font-family:var(--sans);font-size:0.75rem;font-weight:600;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.05em;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.card-title{font-family:var(--serif);font-size:1.25rem;font-weight:500;color:var(--ink);margin-bottom:1rem;}
.users-table{width:100%;border-collapse:collapse;font-size:0.8rem;margin-top:1rem;}
.users-table th{text-align:left;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:0.75rem;border-bottom:1px solid var(--border);font-weight:600;background:rgba(255,255,255,0.5);}
.users-table td{padding:0.75rem;border-bottom:1px solid var(--border);color:var(--dim);}
.users-table tr:hover{background:var(--cream);}
.users-table .bal{color:var(--teal);font-weight:600;font-family:var(--serif);}
.users-empty{padding:2rem;text-align:center;color:var(--muted);font-size:0.8rem;}
.loading{text-align:center;padding:2rem;color:var(--dim);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
label{display:block;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:0.3rem;}
.fgroup{margin-bottom:0.75rem;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal.show{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:400px;position:relative;}
.modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:600;margin-bottom:1rem;}
.modal-close{position:absolute;right:1.5rem;top:1.5rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--dim);}
@media(max-width:768px){.row2{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:0 1rem}.main{padding:1.5rem 1rem}}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-title">🔐 Admin Only</div>
    <div class="lock-sub">Enter your admin password</div>
    <input class="finput" id="pwdInput" type="password" placeholder="Admin password" autofocus>
    <button class="fbtn full" onclick="unlock()">Unlock</button>
    <div class="alert err show" id="lockErr"></div>
  </div>
</div>

<div class="topbar">
  <div class="wordmark">NAGOH <em>Admin</em></div>
  <div class="topbar-right">
    <div class="badge">ADMIN</div>
    <button class="signout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="page-title">Admin Dashboard</div>
    <div class="page-sub">User & Token Management</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statUsers">0</div>
      <div class="stat-label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statActive">0</div>
      <div class="stat-label">Active Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTokens">0</div>
      <div class="stat-label">Tokens Distributed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg">0</div>
      <div class="stat-label">Avg Tokens/User</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">USERS</button>
    <button class="tab" onclick="switchTab(1)">ADD USER</button>
    <button class="tab" onclick="switchTab(2)">AWARD TOKENS</button>
  </div>

  <!-- Tab 0: Users List -->
  <div class="tab-content active">
    <div class="card">
      <div class="card-title">User Management</div>
      <div id="usersLoading" class="loading"><div class="spinner"></div> Loading users...</div>
      <div id="usersEmpty" class="users-empty" style="display:none;">No users found</div>
      <table class="users-table" id="usersTable" style="display:none;">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Tokens</th><th>Created</th><th>Action</th></tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 1: Add User -->
  <div class="tab-content">
    <div class="card">
      <div class="card-title">Add User</div>
      <div class="fgroup">
        <label>Full Name</label>
        <input class="finput" id="addName" type="text" placeholder="John Doe">
      </div>
      <div class="fgroup">
        <label>Email</label>
        <input class="finput" id="addEmail" type="email" placeholder="john@example.com">
      </div>
      <div class="fgroup">
        <label>Initial Tokens</label>
        <input class="finput" id="addTokens" type="number" placeholder="5000" min="0" value="5000">
      </div>
      <button class="fbtn full" onclick="addUser()">Create User</button>
      <div class="alert ok" id="addOk"></div>
      <div class="alert err" id="addErr"></div>
    </div>
  </div>

  <!-- Tab 2: Award Tokens -->
  <div class="tab-content">
    <div class="card">
      <div class="card-title">Award Tokens</div>
      <div class="fgroup">
        <label>User Email</label>
        <input class="finput" id="awardEmail" type="email" placeholder="user@example.com">
      </div>
      <div class="fgroup">
        <label>Tokens to Award</label>
        <input class="finput" id="awardAmount" type="number" placeholder="1000" min="1">
      </div>
      <div class="fgroup">
        <label>Reason (optional)</label>
        <input class="finput" id="awardReason" type="text" placeholder="Bonus, support...">
      </div>
      <button class="fbtn gold full" onclick="awardTokens()">Award Tokens</button>
      <div class="alert ok" id="awardOk"></div>
      <div class="alert err" id="awardErr"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="tokenModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Assign Tokens</div>
    <div style="margin-bottom:1rem;">
      <p style="font-size:0.85rem;margin-bottom:0.5rem;"><strong id="modalUserName"></strong></p>
      <p style="font-size:0.75rem;color:var(--dim);" id="modalUserEmail"></p>
    </div>
    <div class="fgroup">
      <label>Amount to Assign</label>
      <input class="finput" id="modalTokens" type="number" placeholder="1000" min="1">
    </div>
    <div class="fgroup">
      <label>Note (optional)</label>
      <input class="finput" id="modalNote" type="text" placeholder="Reason for assignment">
    </div>
    <button class="fbtn gold full" onclick="confirmAssignTokens()">Assign</button>
    <div class="alert ok" id="modalOk"></div>
    <div class="alert err" id="modalErr"></div>
  </div>
</div>

<script>
const WORKER = 'https://nagohai.gregoryhogan.workers.dev';
let adminPwd = localStorage.getItem('adminPwd') || '';
let allUsers = [];
let selectedUserId = null;

function switchTab(idx) {
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content')[idx].classList.add('active');
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

async function unlock() {
  const pwd = document.getElementById('pwdInput').value.trim();
  if (!pwd) { showErr('lockErr', 'Enter password'); return; }

  try {
    const r = await fetch(WORKER + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });

    if (r.status === 401) {
      showErr('lockErr', 'Incorrect password');
      return;
    }

    if (!r.ok) {
      showErr('lockErr', 'Login failed');
      return;
    }

    adminPwd = pwd;
    localStorage.setItem('adminPwd', pwd);
    document.getElementById('lockScreen').style.display = 'none';
    loadAllUsers();
  } catch (e) {
    showErr('lockErr', 'Error: ' + e.message);
  }
}

async function loadAllUsers() {
  document.getElementById('usersLoading').style.display = 'block';
  document.getElementById('usersEmpty').style.display = 'none';
  document.getElementById('usersTable').style.display = 'none';

  try {
    const r = await fetch(WORKER + '/admin/api/users', {
      headers: { 'X-Admin-Password': adminPwd }
    });

    if (!r.ok) throw new Error('Failed to load users');
    const data = await r.json();
    
    allUsers = data.users || [];
    document.getElementById('usersLoading').style.display = 'none';
    renderUsers();
    updateStats();
  } catch (e) {
    document.getElementById('usersLoading').style.display = 'none';
    document.getElementById('usersLoading').innerHTML = 'Error: ' + e.message;
  }
}

function renderUsers() {
  const tbody = document.getElementById('usersBody');
  tbody.innerHTML = '';

  if (allUsers.length === 0) {
    document.getElementById('usersEmpty').style.display = 'block';
    document.getElementById('usersTable').style.display = 'none';
    return;
  }

  document.getElementById('usersTable').style.display = 'table';
  document.getElementById('usersEmpty').style.display = 'none';

  allUsers.forEach(function(u) {
    const tr = document.createElement('tr');
    const date = new Date(u.created_at || 0).toLocaleDateString();
    const name = u.name || 'N/A';
    const email = u.email || 'Guest';
    const balance = (u.token_balance || 0).toLocaleString();
    tr.innerHTML = '<td>' + name + '</td><td>' + email + '</td><td class="bal">' + balance + '</td><td>' + date + '</td><td><button class="fbtn" style="width:auto;padding:0.5rem 1rem;font-size:0.7rem;" onclick="openTokenModal(\'' + u.user_id + '\',\'' + name.replace(/'/g, "\\'") + '\',\'' + email.replace(/'/g, "\\'") + '\')">+ Tokens</button></td>';
    tbody.appendChild(tr);
  });
}

function updateStats() {
  const total = allUsers.reduce(function(sum, u) { return sum + (u.token_balance || 0); }, 0);
  const active = allUsers.filter(function(u) { return !u.is_guest; }).length;
  document.getElementById('statUsers').textContent = allUsers.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statTokens').textContent = total.toLocaleString();
  document.getElementById('statAvg').textContent = allUsers.length > 0 ? Math.round(total / allUsers.length).toLocaleString() : '0';
}

function openTokenModal(userId, name, email) {
  selectedUserId = userId;
  document.getElementById('modalUserName').textContent = name;
  document.getElementById('modalUserEmail').textContent = email;
  document.getElementById('modalTokens').value = '';
  document.getElementById('modalNote').value = '';
  document.getElementById('modalOk').classList.remove('show');
  document.getElementById('modalErr').classList.remove('show');
  document.getElementById('tokenModal').classList.add('show');
}

function closeModal() {
  document.getElementById('tokenModal').classList.remove('show');
  selectedUserId = null;
}

async function confirmAssignTokens() {
  const amount = parseInt(document.getElementById('modalTokens').value, 10);
  const note = document.getElementById('modalNote').value.trim();

  if (!amount || amount <= 0) {
    showErr('modalErr', 'Enter a positive amount');
    return;
  }

  try {
    const r = await fetch(WORKER + '/admin/api/tokens/award', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': adminPwd
      },
      body: JSON.stringify({ userId: selectedUserId, amount: amount, reason: note })
    });

    const d = await r.json();
    if (!r.ok) { showErr('modalErr', d.error); return; }

    showOk('modalOk', 'Assigned ' + amount.toLocaleString() + ' tokens');
    setTimeout(function() { closeModal(); loadAllUsers(); }, 1500);
  } catch (e) {
    showErr('modalErr', 'Error: ' + e.message);
  }
}

async function addUser() {
  const name = document.getElementById('addName').value.trim();
  const email = document.getElementById('addEmail').value.trim();
  const tokens = parseInt(document.getElementById('addTokens').value, 10) || 0;

  if (!name || !email) {
    showErr('addErr', 'Enter name and email');
    return;
  }

  try {
    const r = await fetch(WORKER + '/admin/api/users', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': adminPwd
      },
      body: JSON.stringify({ name: name, email: email, initialTokens: tokens })
    });

    const d = await r.json();
    if (!r.ok) { showErr('addErr', d.error); return; }

    showOk('addOk', 'Created ' + name);
    document.getElementById('addName').value = '';
    document.getElementById('addEmail').value = '';
    document.getElementById('addTokens').value = '5000';
    setTimeout(function() { loadAllUsers(); }, 1000);
  } catch (e) {
    showErr('addErr', 'Error: ' + e.message);
  }
}

async function awardTokens() {
  const email = document.getElementById('awardEmail').value.trim();
  const amount = parseInt(document.getElementById('awardAmount').value, 10);
  const reason = document.getElementById('awardReason').value.trim();

  if (!email || !amount || amount <= 0) {
    showErr('awardErr', 'Enter email and positive amount');
    return;
  }

  try {
    const r = await fetch(WORKER + '/admin/api/gift', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Password': adminPwd
      },
      body: JSON.stringify({ email: email, amount: amount, note: reason })
    });

    const d = await r.json();
    if (!r.ok) { showErr('awardErr', d.error); return; }

    showOk('awardOk', 'Awarded ' + amount.toLocaleString() + ' tokens');
    document.getElementById('awardEmail').value = '';
    document.getElementById('awardAmount').value = '';
    document.getElementById('awardReason').value = '';
    setTimeout(function() { loadAllUsers(); }, 1000);
  } catch (e) {
    showErr('awardErr', 'Error: ' + e.message);
  }
}

function logout() {
  if (!confirm('Sign out?')) return;
  adminPwd = '';
  localStorage.removeItem('adminPwd');
  location.reload();
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.classList.remove('ok');
  el.classList.add('err', 'show');
  el.textContent = msg;
}

function showOk(id, msg) {
  const el = document.getElementById(id);
  el.classList.remove('err');
  el.classList.add('ok', 'show');
  el.textContent = msg;
}

window.addEventListener('load', function() {
  if (adminPwd) {
    document.getElementById('lockScreen').style.display = 'none';
    loadAllUsers();
  }
});

document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});
</script>
</body>
</html>
