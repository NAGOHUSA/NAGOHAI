<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI.NAGOH — Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #07090f;
  --surface: #0d1117;
  --panel:   #111820;
  --border:  rgba(56,178,255,0.1);
  --border2: rgba(56,178,255,0.2);
  --accent:  #38b2ff;
  --accent2: #a78bfa;
  --text:    #dde4f0;
  --muted:   #5a6a82;
  --dim:     #2a3444;
  --mono:    'Space Mono', monospace;
  --sans:    'Syne', sans-serif;
  --danger:  #ef4444;
  --success: #22c55e;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); display: flex; flex-direction: column;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(56,178,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,178,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}

/* TOP BAR */
.topbar {
  position: relative; z-index: 10;
  display: flex; align-items: center;
  padding: 0 1.25rem; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  gap: 0.75rem; flex-shrink: 0;
}
.logo { font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.12em; color: var(--text); }
.logo span { color: var(--accent); }
.topbar-sep { flex: 1; }
.pill {
  font-family: var(--mono); font-size: 0.68rem;
  border: 1px solid var(--border); padding: 0.22rem 0.65rem;
  letter-spacing: 0.05em; white-space: nowrap;
}
.pill.accent  { color: var(--accent); border-color: var(--border2); }
.pill.muted   { color: var(--muted); }
.pill.dev     { color: #f59e0b; border-color: rgba(245,158,11,0.3); }

/* LAYOUT */
.app { position: relative; z-index: 1; display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-section { padding: 0.85rem 0.9rem; border-bottom: 1px solid var(--border); }
.sb-label {
  font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
  letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem;
}
.balance-num { font-family: var(--mono); font-size: 1.4rem; color: var(--accent); font-weight: 700; }
.balance-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
.status-row  { display: flex; align-items: center; gap: 6px; margin-top: 0.5rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok  { background: var(--success); box-shadow: 0 0 5px rgba(34,197,94,0.5); }
.dot.err { background: var(--danger); }
.status-txt { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }

.btn-sb {
  width: 100%; font-family: var(--mono); font-size: 0.65rem;
  padding: 0.4rem; background: transparent;
  border: 1px solid var(--border2); color: var(--accent);
  cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
  transition: all 0.15s; margin-bottom: 0.4rem;
}
.btn-sb:last-child { margin-bottom: 0; }
.btn-sb:hover { background: var(--accent); color: var(--bg); }
.btn-sb.danger { border-color: rgba(239,68,68,0.25); color: var(--danger); }
.btn-sb.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

.model-select {
  width: 100%; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 0.68rem;
  padding: 0.4rem 0.5rem; outline: none; cursor: pointer;
}
.model-select option { background: var(--panel); }

.sys-textarea {
  width: 100%; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 0.65rem;
  padding: 0.4rem 0.5rem; outline: none; resize: none; line-height: 1.4;
  transition: border-color 0.15s;
}
.sys-textarea:focus { border-color: var(--accent); }

.history-wrap { flex: 1; overflow-y: auto; padding: 0.4rem; }
.history-wrap::-webkit-scrollbar { width: 3px; }
.history-wrap::-webkit-scrollbar-thumb { background: var(--dim); }
.hist-item {
  font-size: 0.72rem; color: var(--muted); padding: 0.4rem 0.55rem;
  cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: all 0.1s; border-left: 2px solid transparent; border-radius: 1px;
}
.hist-item:hover { color: var(--text); background: var(--panel); }
.hist-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--panel); }

/* CHAT */
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.messages { flex: 1; overflow-y: auto; padding: 1.5rem 0; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--dim); }

.msg-row {
  display: flex; padding: 0.45rem 1.5rem; gap: 0.85rem;
  max-width: 800px; margin: 0 auto; width: 100%;
  animation: fadeUp 0.18s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.55rem; flex-shrink: 0; margin-top: 3px;
}
.avatar.ai  { background: rgba(56,178,255,0.1); color: var(--accent); border: 1px solid var(--border2); }
.avatar.you { background: rgba(167,139,250,0.1); color: var(--accent2); border: 1px solid rgba(167,139,250,0.25); }

.bubble {
  max-width: 74%; padding: 0.65rem 0.95rem;
  font-size: 0.875rem; line-height: 1.65;
  border: 1px solid var(--border); white-space: pre-wrap; word-break: break-word;
}
.msg-row.ai   .bubble { background: var(--panel); border-radius: 0 8px 8px 8px; }
.msg-row.user .bubble { background: rgba(56,178,255,0.07); border-color: rgba(56,178,255,0.15); border-radius: 8px 0 8px 8px; }
.bubble.thinking { color: var(--muted); font-family: var(--mono); font-size: 0.75rem; font-style: italic; }

.msg-meta { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-top: 0.25rem; }
.msg-meta span { color: var(--accent); }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; text-align: center; padding: 2rem; opacity: 0.55;
}
.empty-logo { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 0.4rem; }
.empty-sub  { font-size: 0.8rem; color: var(--muted); max-width: 260px; line-height: 1.6; }

/* INPUT */
.input-area {
  border-top: 1px solid var(--border); background: var(--surface);
  padding: 0.85rem 1.5rem; flex-shrink: 0;
}
.input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 0.65rem; align-items: flex-end; }
.prompt-box {
  flex: 1; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 0.875rem;
  padding: 0.65rem 0.9rem; outline: none; resize: none;
  min-height: 42px; max-height: 130px; line-height: 1.5;
  transition: border-color 0.15s; border-radius: 2px;
}
.prompt-box::placeholder { color: var(--muted); }
.prompt-box:focus { border-color: var(--accent); }
.send-btn {
  font-family: var(--mono); font-size: 0.72rem;
  padding: 0 1.1rem; height: 42px; background: var(--accent);
  border: none; color: var(--bg); cursor: pointer;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700;
  transition: all 0.15s; flex-shrink: 0; border-radius: 2px;
}
.send-btn:hover:not(:disabled) { background: #fff; }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.input-footer {
  max-width: 800px; margin: 0.4rem auto 0;
  display: flex; justify-content: space-between; align-items: center;
}
.hint { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }
.hint kbd { border: 1px solid var(--border2); padding: 0 3px; border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AI.<span>NAGOH</span>.US</div>
  <div class="pill muted" id="modelLabel">deepseek-chat</div>
  <div class="topbar-sep"></div>
  <div class="pill dev" id="devBadge" style="display:none">⚡ DEV MODE</div>
  <div class="pill accent" id="topTokens">connecting...</div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">// Balance</div>
      <div class="balance-num" id="balanceNum">—</div>
      <div class="balance-sub">NAGOH tokens</div>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <div class="status-txt" id="statusTxt">connecting...</div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">// Model</div>
      <select class="model-select" id="modelSelect" onchange="onModelChange()">
        <option value="deepseek-chat">deepseek-chat</option>
        <option value="deepseek-reasoner">deepseek-reasoner (R1)</option>
      </select>
    </div>

    <div class="sb-section">
      <div class="sb-label">// System Prompt</div>
      <textarea class="sys-textarea" id="sysPrompt" rows="4"
        placeholder="You are a helpful assistant...">You are NAGOH AI — a sharp, helpful, and concise assistant. Be direct and useful.</textarea>
    </div>

    <div class="sb-section">
      <button class="btn-sb" onclick="newChat()">+ New Chat</button>
      <button class="btn-sb danger" onclick="clearHistory()">Clear History</button>
    </div>

    <div class="sb-label" style="padding:0.6rem 0.9rem 0.2rem;">// History</div>
    <div class="history-wrap" id="historyWrap"></div>
  </div>

  <!-- Chat -->
  <div class="chat-main">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">AI.NAGOH.US</div>
        <div class="empty-sub">Agent ready. Type a message below to begin.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="prompt-box" id="promptBox" placeholder="Ask anything..."
          rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">Send →</button>
      </div>
      <div class="input-footer">
        <div class="hint"><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> newline</div>
        <div class="hint" id="charHint"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG — update TEST_API_KEY to match your Worker Variable ──
const WORKER      = 'https://nagohai.gregoryhogan.workers.dev';
const TEST_API_KEY = 'NAGOHAI'; // paste your TEST_API_KEY value

// ── State ──────────────────────────────────────────────────────
let messages    = [];
let sessions    = JSON.parse(localStorage.getItem('nagoh_sessions') || '[]');
let currentSess = null;
let sending     = false;
let balance     = null;

// ── Boot ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  renderHistory();
  await loadBalance();
  document.getElementById('sendBtn').disabled = false;
});

// ── Balance ────────────────────────────────────────────────────
async function loadBalance() {
  try {
    const res  = await fetch(`${WORKER}/v1/balance`, { headers: { 'X-API-Key': TEST_API_KEY } });
    const data = await res.json();
    if (!res.ok) { setStatus('error', 'err'); return; }
    balance = data.token_balance;
    updateBalanceUI(balance, data.dev_mode);
    setStatus('connected', 'ok');
    if (data.dev_mode) document.getElementById('devBadge').style.display = 'block';
  } catch {
    setStatus('offline', 'err');
    document.getElementById('topTokens').textContent = 'offline';
  }
}

function updateBalanceUI(n, devMode) {
  const label = devMode ? '∞ unlimited' : n.toLocaleString();
  document.getElementById('balanceNum').textContent  = label;
  document.getElementById('topTokens').textContent   = devMode ? '∞ dev mode' : `${n.toLocaleString()} tokens`;
}

function setStatus(text, state) {
  document.getElementById('statusTxt').textContent = text;
  const d = document.getElementById('statusDot');
  d.className = 'dot' + (state ? ` ${state}` : '');
}

// ── Model ──────────────────────────────────────────────────────
function onModelChange() {
  document.getElementById('modelLabel').textContent =
    document.getElementById('modelSelect').value;
}

// ── Send ───────────────────────────────────────────────────────
async function send() {
  const box  = document.getElementById('promptBox');
  const text = box.value.trim();
  if (!text || sending) return;

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  box.value = ''; box.style.height = 'auto';
  document.getElementById('charHint').textContent = '';
  document.getElementById('emptyState') && (document.getElementById('emptyState').style.display = 'none');

  messages.push({ role: 'user', content: text });
  addBubble('user', text);

  const thinkId = 'think_' + Date.now();
  addThinking(thinkId);

  try {
    const res  = await fetch(`${WORKER}/v1/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': TEST_API_KEY },
      body: JSON.stringify({
        messages,
        system:      document.getElementById('sysPrompt').value.trim() || undefined,
        model:       document.getElementById('modelSelect').value,
        max_tokens:  2048,
        temperature: 0.7,
      }),
    });

    const data = await res.json();
    removeThinking(thinkId);

    if (!res.ok) {
      addError(data.error || 'Request failed');
      messages.pop();
    } else {
      const reply = data.message.content;
      messages.push({ role: 'assistant', content: reply });
      addBubble('ai', reply, data.nagoh);
      if (data.nagoh && !data.nagoh.dev_mode) {
        balance = data.nagoh.tokens_remaining;
        updateBalanceUI(balance, false);
      }
      saveSession(text);
    }
  } catch (e) {
    removeThinking(thinkId);
    addError('Network error — check console.');
    messages.pop();
    console.error(e);
  }

  sending = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('promptBox').focus();
}

// ── DOM ────────────────────────────────────────────────────────
function addBubble(role, content, nagoh) {
  const msgs = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = `msg-row ${role}`;

  const meta = (nagoh && !nagoh.dev_mode)
    ? `<div class="msg-meta">−<span>${nagoh.tokens_charged}</span> tokens &nbsp;·&nbsp; <span>${nagoh.tokens_remaining.toLocaleString()}</span> left</div>`
    : '';

  row.innerHTML = `
    <div class="avatar ${role}">${role === 'ai' ? 'AI' : 'YOU'}</div>
    <div>
      <div class="bubble">${esc(content)}</div>
      ${meta}
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addThinking(id) {
  const msgs = document.getElementById('messages');
  const row  = document.createElement('div');
  row.id = id; row.className = 'msg-row ai';
  row.innerHTML = `<div class="avatar ai">AI</div><div class="bubble thinking" id="${id}_b">thinking</div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  let n = 0;
  row._t = setInterval(() => {
    const b = document.getElementById(`${id}_b`);
    if (b) b.textContent = 'thinking' + '.'.repeat(++n % 4);
  }, 380);
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) { clearInterval(el._t); el.remove(); }
}

function addError(msg) {
  const msgs = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="avatar ai">AI</div>
    <div class="bubble" style="color:var(--danger);border-color:rgba(239,68,68,0.2);">⚠ ${esc(msg)}</div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Sessions ───────────────────────────────────────────────────
function saveSession(firstMsg) {
  if (!currentSess) {
    currentSess = { id: Date.now(), title: firstMsg.slice(0, 44), messages: [] };
    sessions.unshift(currentSess);
    if (sessions.length > 40) sessions.pop();
  }
  currentSess.messages = [...messages];
  localStorage.setItem('nagoh_sessions', JSON.stringify(sessions));
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  wrap.innerHTML = '';
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'hist-item' + (currentSess?.id === s.id ? ' active' : '');
    el.textContent = s.title;
    el.onclick = () => {
      currentSess = s; messages = [...s.messages];
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      messages.forEach(m => addBubble(m.role === 'user' ? 'user' : 'ai', m.content));
      renderHistory();
    };
    wrap.appendChild(el);
  });
}

function newChat() {
  currentSess = null; messages = [];
  document.getElementById('messages').innerHTML =
    `<div class="empty-state" id="emptyState">
      <div class="empty-logo">AI.NAGOH.US</div>
      <div class="empty-sub">Agent ready. Type a message below to begin.</div>
    </div>`;
  renderHistory();
}

function clearHistory() {
  if (!confirm('Clear all chat history?')) return;
  sessions = []; currentSess = null; messages = [];
  localStorage.removeItem('nagoh_sessions');
  newChat();
}

// ── UX ─────────────────────────────────────────────────────────
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  document.getElementById('charHint').textContent = el.value.length > 0 ? `${el.value.length}c` : '';
}
</script>
</body>
</html>
