// Initialize templates on page load
function initTemplates() {
  if (typeof currentIndustry === 'undefined') {
    console.log('⏳ Waiting for currentIndustry...');
    setTimeout(initTemplates, 100);
    return;
  }
  
  console.log('✅ currentIndustry ready:', currentIndustry);
  renderTemplates();
  
  // Listen for industry changes
  const originalOnIndustryChange = window.onIndustryChange;
  window.onIndustryChange = function() {
    console.log('🔄 Industry changed, reloading templates');
    if (originalOnIndustryChange) {
      originalOnIndustryChange.apply(this, arguments);
    }
    setTimeout(renderTemplates, 100);
  };
}

function renderTemplates() {
  const industryKey = (currentIndustry || 'default').toLowerCase();
  const config = industryTemplates[industryKey] || industryTemplates.default;
  
  // Safety checks - log which elements are missing
  const titleEl = document.getElementById('templatesTitle');
  const descEl = document.getElementById('templatesDescription');
  const headingEl = document.getElementById('templatesHeading');
  const quoteEl = document.getElementById('quoteToolTitle');
  const templatesContainer = document.getElementById('templatesContainer');
  const strategiesContainer = document.getElementById('strategiesContainer');
  
  if (!titleEl) console.error('❌ templatesTitle is null');
  if (!descEl) console.error('❌ templatesDescription is null');
  if (!headingEl) console.error('❌ templatesHeading is null');
  if (!quoteEl) console.error('❌ quoteToolTitle is null');
  if (!templatesContainer) console.error('❌ templatesContainer is null');
  if (!strategiesContainer) console.error('❌ strategiesContainer is null');
  
  // Only proceed if all elements exist
  if (!titleEl || !descEl || !headingEl || !quoteEl || !templatesContainer || !strategiesContainer) {
    console.log('⏳ Elements still not ready, retrying...');
    setTimeout(renderTemplates, 200);
    return;
  }
  
  // Update titles
  titleEl.textContent = config.title;
  descEl.textContent = config.description;
  headingEl.textContent = 'Templates for ' + config.title;
  quoteEl.textContent = config.quoteTitle;
  
  // Render template cards
  templatesContainer.innerHTML = config.templates.map(template => `
    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;transition:all 0.2s;" onmouseover="this.style.boxShadow='0 4px 12px rgba(42,157,143,0.15)'" onmouseout="this.style.boxShadow='none'">
      <div style="font-size:2rem;margin-bottom:0.5rem;">${template.emoji}</div>
      <div style="font-weight:700;color:var(--ink);margin-bottom:0.25rem;font-size:0.95rem;">${template.title}</div>
      <div style="font-size:0.75rem;color:var(--dim);margin-bottom:0.75rem;">${template.desc}</div>
      <div id="${template.id}" style="background:var(--teal-lt);border:1px solid var(--teal);border-radius:6px;padding:0.75rem;font-size:0.7rem;white-space:pre-wrap;font-family:monospace;margin-bottom:0.75rem;max-height:150px;overflow:auto;line-height:1.4;">${template.content}</div>
      <div style="display:flex;gap:0.5rem;">
        <button onclick="window.copyText('${template.id}')" style="flex:1;padding:0.5rem;background:#fff;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600;">📋 Copy</button>
        <button onclick="window.pasteToChat('${template.id}')" style="flex:1;padding:0.5rem;background:var(--teal);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600;">📤 Chat</button>
      </div>
    </div>
  `).join('');
  
  // Render strategy cards
  strategiesContainer.innerHTML = config.strategies.map((strategy, idx) => `
    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;transition:all 0.2s;cursor:pointer;" onmouseover="this.style.boxShadow='0 4px 12px rgba(42,157,143,0.15)';this.style.borderColor='var(--teal)'" onmouseout="this.style.boxShadow='none';this.style.borderColor='var(--border)'" onclick="window.sendStrategyToChat('${strategy.prompt.replace(/'/g, "\\'")}')">
      <div style="font-size:1.8rem;margin-bottom:0.5rem;">${strategy.emoji}</div>
      <div style="font-weight:700;color:var(--ink);margin-bottom:0.5rem;font-size:0.9rem;">${strategy.title}</div>
      <div style="font-size:0.75rem;color:var(--dim);line-height:1.5;margin-bottom:0.75rem;">${strategy.prompt.substring(0, 80)}...</div>
      <button style="width:100%;padding:0.5rem;background:var(--teal);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.75rem;font-weight:600;">➕ Use Strategy</button>
    </div>
  `).join('');
}

// Global functions
window.copyText = function(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const original = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = original; }, 2000);
  }).catch(() => {
    alert('Copy failed. Please try again.');
  });
};

window.pasteToChat = function(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  
  const text = el.textContent;
  const chatPrompt = document.getElementById('prompt');
  
  if (chatPrompt) {
    chatPrompt.value = text;
    chatPrompt.focus();
    if (typeof switchTab === 'function') switchTab('chat');
    if (typeof showSuccessNotification === 'function') {
      showSuccessNotification('✅ Template pasted to chat!');
    }
  }
};

window.sendStrategyToChat = function(prompt) {
  const chatPrompt = document.getElementById('prompt');
  if (chatPrompt) {
    chatPrompt.value = prompt;
    chatPrompt.focus();
    if (typeof switchTab === 'function') switchTab('chat');
    if (typeof showSuccessNotification === 'function') {
      showSuccessNotification('✅ Strategy prompt sent to chat!');
    }
  }
};

window.genQuote = function() {
  const name = document.getElementById('quoteName').value.trim();
  const service = document.getElementById('quoteService').value.trim();
  const scope = document.getElementById('quoteScope').value.trim();
  const budget = document.getElementById('quoteBudget').value.trim();
  
  if (!name || !service) {
    alert('Please fill in client name and service type');
    return;
  }
  
  const quote = `PROJECT QUOTE

Date: ${new Date().toLocaleDateString()}
Client: ${name}

Service: ${service}
Scope: ${scope}
Budget: ${budget}

Terms: 50% deposit, 50% on completion
Timeline: TBD based on scope

Thank you for your business!`;
  
  const box = document.getElementById('quoteBox');
  box.innerHTML = `
    <div style="background:var(--gold-lt);border:1px solid var(--gold);border-radius:6px;padding:0.75rem;font-size:0.7rem;white-space:pre-wrap;font-family:monospace;margin-bottom:0.75rem;" id="generatedQuote">${quote}</div>
    <button onclick="window.copyText('generatedQuote')" style="width:100%;padding:0.5rem;background:#fff;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600;">📋 Copy Quote</button>
  `;
};

window.getSuggestions = function() {
  const content = document.getElementById('suggestArea').value;
  const box = document.getElementById('suggestBox');
  
  if (!content.trim()) {
    box.innerHTML = '<div style="color:var(--dim);">📝 Paste content to get suggestions</div>';
    return;
  }
  
  const tips = [];
  if (content.includes('utilize')) tips.push('✨ Replace "utilize" with "use"');
  if (content.includes('leverage')) tips.push('✨ Replace "leverage" with "use" or "apply"');
  if (/[A-Z]{5,}/.test(content)) tips.push('✨ Reduce ALL-CAPS for friendlier tone');
  if (content.length > 500) tips.push('✨ Break into shorter paragraphs');
  if (content.split('.').length < 3) tips.push('✨ Add more specific examples');
  if (content.match(/\b(very|really|quite|actually|basically)\b/gi)) tips.push('✨ Remove filler words');
  if (!/[!?]/.test(content)) tips.push('✨ Add more personality with punctuation');
  
  if (tips.length === 0) {
    box.innerHTML = '<div style="color:var(--teal);padding:0.75rem;background:var(--teal-lt);border-radius:6px;">✅ Content looks great!</div>';
  } else {
    box.innerHTML = tips.map(t => `<div style="padding:0.5rem;background:var(--teal-lt);border-radius:4px;margin-bottom:0.5rem;font-size:0.8rem;">${t}</div>`).join('');
  }
};
