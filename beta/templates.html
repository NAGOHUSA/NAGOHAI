<h2 style="margin-bottom:1.5rem;">📋 Templates & Tools</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px,1fr));gap:1.5rem;">
  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;">
    <h3 style="font-size:0.9rem;margin-bottom:1rem;color:var(--ink);">💼 Your Templates</h3>
    <div id="customTemplates"></div>
    <button class="pbtn primary" onclick="window.showNewTemplateModal()" style="margin-top:1rem;width:100%;">+ New Template</button>
  </div>

  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;">
    <h3 style="font-size:0.9rem;margin-bottom:1rem;color:var(--ink);">💰 Quote Generator</h3>
    <div style="display:flex;flex-direction:column;gap:0.75rem;font-size:0.85rem;">
      <input type="text" placeholder="Client name" id="quoteName" style="padding:0.5rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);">
      <input type="text" placeholder="Service type" id="quoteService" style="padding:0.5rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);">
      <input type="text" placeholder="Scope" id="quoteScope" style="padding:0.5rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);">
      <input type="text" placeholder="Budget range" id="quoteBudget" style="padding:0.5rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);">
      <button class="pbtn primary" onclick="window.generateQuote()" style="width:100%;">Generate Quote</button>
    </div>
    <div id="quoteOutput" style="margin-top:1rem;"></div>
  </div>

  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;">
    <h3 style="font-size:0.9rem;margin-bottom:1rem;color:var(--ink);">✨ Smart Suggestions</h3>
    <textarea placeholder="Paste your content here..." id="suggestContent" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:0.8rem;min-height:80px;resize:none;"></textarea>
    <button class="pbtn primary" onclick="window.getSuggestions()" style="width:100%;margin-top:0.75rem;">Get Suggestions</button>
    <div id="suggestOutput" style="margin-top:1rem;font-size:0.8rem;"></div>
  </div>
</div>

<h3 style="margin:2rem 0 1rem;color:var(--ink);">📚 Default Templates</h3>
<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px,1fr));gap:1.5rem;">
  <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.boxShadow='0 4px 12px rgba(42,157,143,0.1)'" onmouseout="this.style.borderColor='var(--border)';this.style.boxShadow='none'" onclick="window.useTemplate('Write a social media post about: ')">
    <div style="font-size:1.8rem;margin-bottom:0.5rem;">📱</div>
    <div style="font-weight:600;color:var(--ink);margin-bottom:0.25rem;">Social Media Post</div>
    <div style="font-size:0.75rem;color:var(--dim);line-height:1.4;">LinkedIn, Twitter, Instagram</div>
  </div>
  <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.boxShadow='0 4px 12px rgba(42,157,143,0.1)'" onmouseout="this.style.borderColor='var(--border)';this.style.boxShadow='none'" onclick="window.useTemplate('Write a professional email about: ')">
    <div style="font-size:1.8rem;margin-bottom:0.5rem;">📧</div>
    <div style="font-weight:600;color:var(--ink);margin-bottom:0.25rem;">Email Campaign</div>
    <div style="font-size:0.75rem;color:var(--dim);line-height:1.4;">Cold outreach or nurture</div>
  </div>
  <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.boxShadow='0 4px 12px rgba(42,157,143,0.1)'" onmouseout="this.style.borderColor='var(--border)';this.style.boxShadow='none'" onclick="window.useTemplate('Generate a professional project quote for: ')">
    <div style="font-size:1.8rem;margin-bottom:0.5rem;">💰</div>
    <div style="font-weight:600;color:var(--ink);margin-bottom:0.25rem;">Project Quote</div>
    <div style="font-size:0.75rem;color:var(--dim);line-height:1.4;">Professional pricing</div>
  </div>
  <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.boxShadow='0 4px 12px rgba(42,157,143,0.1)'" onmouseout="this.style.borderColor='var(--border)';this.style.boxShadow='none'" onclick="window.useTemplate('Create a blog post outline for: ')">
    <div style="font-size:1.8rem;margin-bottom:0.5rem;">📝</div>
    <div style="font-weight:600;color:var(--ink);margin-bottom:0.25rem;">Blog Post Outline</div>
    <div style="font-size:0.75rem;color:var(--dim);line-height:1.4;">Structured content</div>
  </div>
</div>

<script>
window.useTemplate = function(prompt) {
  const chatPrompt = document.getElementById('prompt');
  if (chatPrompt) {
    chatPrompt.value = prompt;
    chatPrompt.focus();
    if (typeof switchTab === 'function') switchTab('chat');
  }
}

window.generateQuote = function() {
  const name = document.getElementById('quoteName').value;
  const service = document.getElementById('quoteService').value;
  const scope = document.getElementById('quoteScope').value;
  const budget = document.getElementById('quoteBudget').value;
  
  if (!name || !service) {
    alert('Please fill in client name and service type');
    return;
  }
  
  const quote = `PROJECT QUOTE\n\nDate: ${new Date().toLocaleDateString()}\nClient: ${name}\n\nService: ${service}\nScope: ${scope}\nBudget: ${budget}\n\nTerms: 50% deposit, 50% on completion\nTimeline: TBD based on scope\n\nThank you for your business!`;
  
  const output = document.getElementById('quoteOutput');
  output.innerHTML = `
    <div style="background:var(--gold-lt);border:1px solid var(--gold-md);border-radius:8px;padding:1rem;font-size:0.8rem;white-space:pre-wrap;margin-bottom:0.75rem;">${quote.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    <button class="pbtn primary" onclick="window.moveQuoteToChat('${quote.replace(/'/g, "\\'")}')">📤 Move to Chat</button>
  `;
}

window.moveQuoteToChat = function(quoteText) {
  const chatPrompt = document.getElementById('prompt');
  if (chatPrompt) {
    // Decode the escaped quote
    const decoded = quoteText
      .replace(/\\n/g, '\n')
      .replace(/\\'/g, "'");
    
    chatPrompt.value = decoded;
    chatPrompt.focus();
    
    // Scroll to chat tab
    if (typeof switchTab === 'function') switchTab('chat');
    
    // Auto-scroll to chat area
    setTimeout(() => {
      const chatArea = document.getElementById('msgs');
      if (chatArea) chatArea.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }
}

window.getSuggestions = function() {
  const content = document.getElementById('suggestContent').value;
  const output = document.getElementById('suggestOutput');
  
  if (!content || content.trim() === '') {
    output.innerHTML = '<div style="color:var(--dim);padding:0.5rem;">📝 Paste some content to get suggestions!</div>';
    return;
  }
  
  const suggestions = [];
  
  // Check for common writing issues
  if (content.includes('utilize')) suggestions.push('Replace "utilize" with "use"');
  if (content.includes('leverage')) suggestions.push('Replace "leverage" with "use" or "apply"');
  if (content.length > 500) suggestions.push('Consider breaking this into shorter sections');
  if (/[A-Z]{5,}/.test(content)) suggestions.push('Reduce ALL-CAPS for friendlier tone');
  if (content.split('.').length < 3) suggestions.push('Add more specific examples');
  if (content.match(/\b(very|really|quite|so)\b/gi)) suggestions.push('Remove filler words like "very" or "really"');
  if (content.match(/\b(however|therefore|thus)\b/gi)) suggestions.push('Use simpler transitions like "but" or "so"');
  if (!content.includes('!') && !content.includes('?')) suggestions.push('Consider adding a question or exclamation for engagement');
  
  if (suggestions.length > 0) {
    output.innerHTML = suggestions.map(s => `<div style="padding:0.5rem;background:var(--teal-lt);border-radius:6px;margin-bottom:0.5rem;">✨ ${s}</div>`).join('');
  } else {
    output.innerHTML = '<div style="color:var(--teal);">✅ Content looks great!</div>';
  }
}

window.showNewTemplateModal = function() {
  const name = prompt('Template name:');
  if (!name) return;
  
  const content = prompt('Template content (use [BRACKETS] for placeholders):');
  if (!content) return;
  
  const templates = JSON.parse(localStorage.getItem('nagoh_custom_templates') || '[]');
  templates.push({
    id: 'tpl_' + Date.now(),
    name: name,
    content: content,
    icon: '📝'
  });
  
  localStorage.setItem('nagoh_custom_templates', JSON.stringify(templates));
  
  if (typeof showSuccessNotification === 'function') {
    showSuccessNotification(`✅ Template "${name}" created!`);
  }
}
</script>
