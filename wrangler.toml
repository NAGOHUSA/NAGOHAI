name = "nagoh-ai-worker"
main = "index.js"
compatibility_date = "2024-09-23"

# Uncomment after deploying to attach to ai.nagoh.us:
# routes = [
#   { pattern = "ai.nagoh.us/*", zone_name = "nagoh.us" }
# ]

[[kv_namespaces]]
binding = "NAGOH_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Set secrets via CLI — never put values here:
#   wrangler secret put DEEPSEEK_API_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put ADMIN_KEY

[observability]
enabled = true
